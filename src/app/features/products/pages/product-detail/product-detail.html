<div class="container">
    <div class="row g-4">

        <div class="col-md-6">
            <img [src]="product?.image" class="img-fluid rounded shadow">
        </div>

        <div class="col-md-6">

            @if (product) {
            <h2 class="fw-bold">{{ product.name }}</h2>

            <p class="text-muted">
                {{ product.category }}
            </p>

            <h4 class="text-success mb-3">
                ${{ product.price }}
            </h4>

            <div class="d-flex gap-2">
                <button class="btn btn-primary">
                    Agregar al pedido
                </button>

                <button routerLink="/products" class="btn btn-outline-secondary">
                    Volver
                </button>
            </div>
            }

        </div>

    </div>
</div>
