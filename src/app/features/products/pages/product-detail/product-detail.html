<div class="container-fluid px-4 py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold text-dark mb-0">Product Detail</h2>
      <small class="text-muted">Full product information</small>
    </div>
    <button routerLink="/products" class="btn btn-outline-secondary rounded-3 fw-semibold d-flex align-items-center gap-2">
      <i class="bi bi-arrow-left"></i> Back to Products
    </button>
  </div>

  @if (product) {
  <div class="row g-3">

    <!-- LEFT: Image -->
    <div class="col-lg-5">
      <div class="card border-0 shadow-sm rounded-3 h-100">
        <div class="card-body p-3 d-flex align-items-center justify-content-center">
          <img [src]="product.image" [alt]="product.name"
            class="img-fluid rounded-3 product-detail-img">
        </div>
      </div>
    </div>

    <!-- RIGHT: Info -->
    <div class="col-lg-7">
      <div class="card border-0 shadow-sm rounded-3 h-100">
        <div class="card-body p-4 d-flex flex-column">

          <!-- Category badge -->
          <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2 mb-3 align-self-start">
            {{ product.category }}
          </span>

          <h2 class="fw-bold text-dark mb-1">{{ product.name }}</h2>

          <h3 class="fw-bold text-success mb-4">${{ product.price }}</h3>

          <!-- Stats Row -->
          <div class="row g-3 mb-4">
            <div class="col-6">
              <div class="p-3 rounded-3 bg-light text-center">
                <p class="text-muted text-uppercase fw-semibold mb-1 metric-label">Stock</p>
                <h4 class="fw-bold mb-0">{{ product.stock }}</h4>
              </div>
            </div>
            <div class="col-6">
              <div class="p-3 rounded-3 bg-success-subtle text-center">
                <p class="text-success text-uppercase fw-semibold mb-1 metric-label">Status</p>
                <h4 class="fw-bold text-success mb-0">Active</h4>
              </div>
            </div>
          </div>

          <!-- Divider -->
          <hr class="text-muted opacity-25 mb-4">

          <!-- Actions -->
          <div class="d-flex gap-2 mt-auto">
            <button class="btn btn-primary flex-grow-1 py-3 rounded-3 fw-semibold shadow-sm quick-btn d-flex align-items-center justify-content-center gap-2">
              <i class="bi bi-cart-plus fs-5"></i> Add to Order
            </button>
            <button class="btn btn-outline-secondary rounded-3 fw-semibold px-3 py-3">
              <i class="bi bi-pencil fs-5"></i>
            </button>
            <button class="btn btn-outline-danger rounded-3 fw-semibold px-3 py-3">
              <i class="bi bi-trash fs-5"></i>
            </button>
          </div>

        </div>
      </div>
    </div>

  </div>
  }

</div>
